name: Deploy custom code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload custom code bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "wp-content/themes/theme,wp-content/uploads/2024/08/jingleberry.woff,wp-content/uploads/2024/08/jingleberry.woff2,yandexeda,wp-content/plugins/woocommerce-mysklad-sync,wp-content/plugins/wms-store,wp-content/plugins/wms-addon-groop,update_green_friday.php"
          target: "/tmp/ferma-dv-custom-code"
          rm: true

      - name: Sync custom code into WordPress
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            STAGING="/tmp/ferma-dv-custom-code"
            TARGET="${{ secrets.SERVER_PATH }}"

            mkdir -p "$TARGET/wp-content/themes" "$TARGET/wp-content/plugins"

            rsync -a --delete "$STAGING/wp-content/themes/theme/" "$TARGET/wp-content/themes/theme/"
            install -d "$TARGET/wp-content/uploads/2024/08"
            if [ -f "$STAGING/wp-content/uploads/2024/08/jingleberry.woff" ]; then
              install -m 0644 "$STAGING/wp-content/uploads/2024/08/jingleberry.woff" "$TARGET/wp-content/uploads/2024/08/jingleberry.woff"
            fi
            if [ -f "$STAGING/wp-content/uploads/2024/08/jingleberry.woff2" ]; then
              install -m 0644 "$STAGING/wp-content/uploads/2024/08/jingleberry.woff2" "$TARGET/wp-content/uploads/2024/08/jingleberry.woff2"
            fi
            rsync -a --delete "$STAGING/yandexeda/" "$TARGET/yandexeda/"
            rsync -a --delete "$STAGING/wp-content/plugins/woocommerce-mysklad-sync/" "$TARGET/wp-content/plugins/woocommerce-mysklad-sync/"
            rsync -a --delete "$STAGING/wp-content/plugins/wms-store/" "$TARGET/wp-content/plugins/wms-store/"
            rsync -a --delete "$STAGING/wp-content/plugins/wms-addon-groop/" "$TARGET/wp-content/plugins/wms-addon-groop/"

            if [ -f "$STAGING/update_green_friday.php" ]; then
              install -m 0644 "$STAGING/update_green_friday.php" "$TARGET/update_green_friday.php"
            fi

            # Removed from repo: one-off MoySklad fasovka script (superseded by theme + WMS sync)
            rm -f "$TARGET/ferma_fasovka_sync_once.php" \
                  "$TARGET/ferma_fasovka_sync_once.config.php" \
                  "$TARGET/ferma_fasovka_sync_once.config.sample.php"

            rm -rf "$STAGING"
