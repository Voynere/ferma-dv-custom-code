name: Deploy custom code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show deploy payload
        run: |
          pwd
          ls -la
          ls -la wp-content
          ls -la wp-content/themes
          ls -la wp-content/plugins

      - name: Upload custom code bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "wp-content/themes/theme,yandexeda,wp-content/plugins/woocommerce-mysklad-sync,wp-content/plugins/wms-store,wp-content/plugins/wms-addon-groop,update_green_friday.php,ferma_fasovka_sync_once.php"
          target: "/tmp/ferma-dv-custom-code"
          rm: true
          debug: true

      - name: Sync custom code into WordPress
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          debug: true
          script: |
            set -euo pipefail

            STAGING="/tmp/ferma-dv-custom-code"
            TARGET="${{ secrets.SERVER_PATH }}"

            echo "TARGET=$TARGET"
            echo "STAGING=$STAGING"
            command -v rsync
            ls -la "$STAGING" || true
            ls -la "$STAGING/wp-content" || true
            ls -la "$STAGING/wp-content/themes" || true
            ls -la "$STAGING/wp-content/plugins" || true

            mkdir -p "$TARGET/wp-content/themes" "$TARGET/wp-content/plugins"

            rsync -a --delete "$STAGING/wp-content/themes/theme/" "$TARGET/wp-content/themes/theme/"
            rsync -a --delete "$STAGING/yandexeda/" "$TARGET/yandexeda/"
            rsync -a --delete "$STAGING/wp-content/plugins/woocommerce-mysklad-sync/" "$TARGET/wp-content/plugins/woocommerce-mysklad-sync/"
            rsync -a --delete "$STAGING/wp-content/plugins/wms-store/" "$TARGET/wp-content/plugins/wms-store/"
            rsync -a --delete "$STAGING/wp-content/plugins/wms-addon-groop/" "$TARGET/wp-content/plugins/wms-addon-groop/"

            if [ -f "$STAGING/update_green_friday.php" ]; then
              install -m 0644 "$STAGING/update_green_friday.php" "$TARGET/update_green_friday.php"
            fi

            if [ -f "$STAGING/ferma_fasovka_sync_once.php" ]; then
              install -m 0644 "$STAGING/ferma_fasovka_sync_once.php" "$TARGET/ferma_fasovka_sync_once.php"
            fi
